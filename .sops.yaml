# Recipients that can decrypt files under `creation_rules` below. Each
# entry is a *public* age recipient; the matching *private* key is never
# stored in this repo. Two flavors with different roles:
#
#   &host_<name>   Derived from the machine's SSH host pubkey via
#                  `ssh-to-age`. The matching private key is
#                  `/etc/ssh/ssh_host_ed25519_key` on that host —
#                  root-owned, generated by openssh on first boot.
#                  sops-nix reads it automatically at activation (its
#                  `sops.age.sshKeyPaths` default pulls ed25519 entries
#                  from `services.openssh.hostKeys`), so the running
#                  system can materialize `/run/secrets/*` at every
#                  `nixos-rebuild switch` with no human in the loop.
#
#   &user_<name>   A stand-alone age keypair created once with
#                  `age-keygen`. The matching private key lives at
#                  `~/.config/sops/age/keys.txt` on whichever
#                  workstation you want to *edit* secrets from. This
#                  is the key sops looks for when you run
#                  `sops secrets/personal.yaml` interactively. It is
#                  not in the repo and not on fresh hosts — restore
#                  it from a backup (e.g. 1Password) when provisioning
#                  a new workstation.
#
# Why both: host keys let each system decrypt unattended at boot; the
# user key lets you edit the file from any workstation you've restored
# the key onto, without depending on any single host's SSH private key.

keys:
  # Add new hosts via `nix run .#sops-onboard-host -- lansing@<host> <host>`.
  # The script SSHs to the host, derives an age recipient from its
  # `/etc/ssh/ssh_host_ed25519_key.pub`, inserts the entry below
  # before the `&user_*` anchor, and re-encrypts `secrets/personal.yaml`.
  - &host_battlestation age1jcrsptkkmmz4zt4smndm6m2ay97qcfv5wx54npf0rfkkgff9t9hqz53fwr
  - &user_lansing       age15xgc2txt58sty9lzzkrudm7tu7ekylemt8e68y3fjkc8q8fqa3ms5evrlf

creation_rules:
  - path_regex: secrets/personal\.yaml$
    key_groups:
      - age:
          - *host_battlestation
          - *user_lansing
